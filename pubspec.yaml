name: ibnu_hafidz_flutter
description: Mobile frontend for Ibnu Hafidz backend (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/favicon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/favicon.png
  min_sdk_android: 21
